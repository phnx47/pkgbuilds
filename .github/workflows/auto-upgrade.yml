name: Auto Upgrade
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    outputs:
      pkgs: ${{ steps.check.outputs.pkgs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nvchecker
        run: pip install nvchecker

      - name: Check versions
        id: check
        run: |
          .scripts/nvcheck.sh || [[ $? -eq 1 ]]
          pkgs=()
          while IFS= read -r pkg || [[ -n "${pkg}" ]]; do
            [[ -z "${pkg}" || "${pkg}" == \#* ]] && continue
            cur=$(jq -r --arg p "${pkg}" '.data[$p].version // empty' ver.json)
            new=$(jq -r --arg p "${pkg}" '.data[$p].version // empty' nver.json)
            if [[ -n "${new}" && "${cur}" != "${new}" ]]; then
              pkgs+=("${pkg}")
            fi
          done < auto-upgrade.txt
          echo "pkgs=$(jq -cn '$ARGS.positional' --args "${pkgs[@]}")" >> "$GITHUB_OUTPUT"

  upgrade:
    name: Upgrade ${{ matrix.pkg }}
    needs: check
    if: needs.check.outputs.pkgs != '[]'
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    permissions:
      contents: write
    strategy:
      matrix:
        pkg: ${{ fromJson(needs.check.outputs.pkgs) }}
      fail-fast: false
      max-parallel: 1

    steps:
      - name: Install deps
        run: pacman -Syu --noconfirm git openssh nvchecker jq pacman-contrib

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          mkdir -p ~builder/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~builder/.ssh/id_ed25519
          chmod 600 ~builder/.ssh/id_ed25519
          chown -R builder:builder ~builder/.ssh
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Configure git
        run: |
          su -c "git config --global user.name 'phnx47-bot'" builder
          su -c "git config --global user.email '78849906+phnx47-bot@users.noreply.github.com'" builder
          su -c "git config --global --add safe.directory '*'" builder
          su -c "git config --global core.sshCommand 'ssh -i /home/builder/.ssh/id_ed25519 -o StrictHostKeyChecking=no'" builder

      - name: Checkout submodule
        run: su -c "git -C '${GITHUB_WORKSPACE}' submodule update --init '${{ matrix.pkg }}'" builder

      - name: Upgrade
        run: su -c "cd '${GITHUB_WORKSPACE}' && .scripts/upgrade-package.sh '${{ matrix.pkg }}'" builder

      - name: Push repo
        run: git push origin main
