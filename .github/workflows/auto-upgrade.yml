name: Auto Upgrade
on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    outputs:
      pkgs: ${{ steps.prepare.outputs.pkgs }}
      nvcmp: ${{ steps.nvcheck.outputs.nvcmp }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nvchecker
        run: pip install nvchecker

      - name: Run nvchecker
        id: nvcheck
        run: |
          output=$(.scripts/nvcheck.sh 2>&1) || [[ $? -eq 1 ]]
          {
            echo 'nvcmp<<EOF'
            echo "${output}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Prepare upgrade matrix
        id: prepare
        run: |
          pkgs=()
          while IFS= read -r pkg || [[ -n "${pkg}" ]]; do
            [[ -z "${pkg}" || "${pkg}" == \#* ]] && continue
            cur=$(jq -r --arg p "${pkg}" '.data[$p].version // empty' ver.json)
            new=$(jq -r --arg p "${pkg}" '.data[$p].version // empty' nver.json)
            if [[ -n "${new}" && "${cur}" != "${new}" ]]; then
              pkgs+=("${pkg}")
            fi
          done < auto-upgrade.txt
          echo "pkgs=$(jq -cn '$ARGS.positional' --args "${pkgs[@]}")" >> "$GITHUB_OUTPUT"

  notify:
    name: Notify
    needs: check
    if: needs.check.outputs.nvcmp != ''
    runs-on: ubuntu-latest

    steps:
      - name: Add summary
        run: echo "${{ needs.check.outputs.nvcmp }}" >> $GITHUB_STEP_SUMMARY

      - name: Send mail
        uses: dawidd6/action-send-mail@master
        with:
          server_address: ${{ secrets.MAIL_SMTP_ADDRESS }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: AUR New Version Checker (${{ github.run_number }})
          body: |
            nvchecker found new versions via GitHub Actions [1]

            ${{ needs.check.outputs.nvcmp }}

            [1] https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}

  upgrade:
    name: Upgrade ${{ matrix.pkg }}
    needs: check
    if: needs.check.outputs.pkgs != '[]'
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    permissions:
      contents: write
    strategy:
      matrix:
        pkg: ${{ fromJson(needs.check.outputs.pkgs) }}
      fail-fast: false
      max-parallel: 1

    steps:
      - name: Install deps
        run: pacman -Syu --noconfirm git openssh nvchecker jq pacman-contrib

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          mkdir -p ~builder/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~builder/.ssh/id_ed25519
          chmod 600 ~builder/.ssh/id_ed25519
          chown -R builder:builder ~builder/.ssh
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      - name: Configure git
        run: |
          su -c "git config --global user.name 'phnx47-bot'" builder
          su -c "git config --global user.email '78849906+phnx47-bot@users.noreply.github.com'" builder
          su -c "git config --global --add safe.directory '*'" builder
          su -c "git config --global core.sshCommand 'ssh -i /home/builder/.ssh/id_ed25519 -o StrictHostKeyChecking=no'" builder

      - name: Checkout submodule
        run: |
          su -c "git -C '${GITHUB_WORKSPACE}' pull --rebase" builder
          su -c "git -C '${GITHUB_WORKSPACE}' submodule update --init '${{ matrix.pkg }}'" builder
          su -c "git -C '${GITHUB_WORKSPACE}/${{ matrix.pkg }}' checkout master" builder

      - name: Upgrade
        run: su -c "cd '${GITHUB_WORKSPACE}' && .scripts/upgrade-package.sh '${{ matrix.pkg }}'" builder

      - name: Push repo
        run: su -c "git push" builder
